<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="text-2xl font-bold">
        {{ isEdit() ? 'Editar Producto' : 'Crear Producto' }}
      </h2>
      <button class="close-btn" (click)="close.emit()">×</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="guardar()" class="modal-body">
      <div *ngIf="loading()" class="text-center py-20">
        <div class="spinner"></div>
        <p class="mt-4 text-gray-600">Cargando datos...</p>
      </div>

      <div *ngIf="!loading()">
        <!-- Nombre y Slug -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="label">Nombre *</label>
            <input type="text" formControlName="nombre" (blur)="generateSlug()" class="input" placeholder="Laptop Gamer Pro">
            <p class="error-text" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
              {{ getError('nombre') }}
            </p>
          </div>
          <div>
            <label class="label">Slug *</label>
            <input type="text" formControlName="slug" class="input" placeholder="laptop-gamer-pro">
            <p class="error-text" *ngIf="form.get('slug')?.invalid && form.get('slug')?.touched">
              {{ getError('slug') }}
            </p>
          </div>
        </div>

        <div class="mb-8">
          <label class="label">Categoría *</label>
          <select formControlName="categoriaId" class="input">
            <option [ngValue]="null">Seleccionar categoría</option>
            <option *ngFor="let cat of categorias()" [ngValue]="cat.id">{{ cat.nombre }}</option>
          </select>
          <p class="error-text" *ngIf="form.get('categoriaId')?.invalid && form.get('categoriaId')?.touched">
            {{ getError('categoriaId') }}
          </p>
        </div>

        <hr class="my-10 border-gray-200">

        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-gray-800">Variantes</h3>
          <button type="button" (click)="agregarVariante()" class="btn-add">+ Agregar variante</button>
        </div>

        <div formArrayName="variantes" *ngFor="let variante of variantes.controls; let i = index" class="variante-card">
          <div [formGroupName]="i">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
              <div>
                <label class="label-sm">SKU *</label>
                <input formControlName="sku" class="input" placeholder="LAP-001">
                <p class="error-text" *ngIf="variante.get('sku')?.invalid && variante.get('sku')?.touched">
                  {{ getError('sku', i) }}
                </p>
              </div>
              <div>
                <label class="label-sm">Precio *</label>
                <input type="number" formControlName="precio" class="input" placeholder="999.99">
                <p class="error-text" *ngIf="variante.get('precio')?.invalid && variante.get('precio')?.touched">
                  {{ getError('precio', i) }}
                </p>
              </div>
              <div>
                <label class="label-sm">Stock</label>
                <input type="number" formControlName="stock" class="input" placeholder="50">
              </div>
              <div>
                <label class="label-sm">Imagen URL</label>
                <input formControlName="imagenUrl" class="input" placeholder="https://...">
              </div>
            </div>

            <!-- Atributos dinámicos -->
            <div formGroupName="atributosSeleccionados" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              <div *ngFor="let attr of atributos()">
                <label class="label-sm">{{ attr.nombre }}</label>
                <select [formControlName]="attr.nombre" class="input text-sm">
                  <option value="">— Sin {{ attr.nombre.toLowerCase() }} —</option>
                  <option *ngFor="let val of getValoresDe(attr.nombre)" [value]="val.valor">
                    {{ val.valor }}
                  </option>
                </select>
              </div>

              <div *ngIf="atributos().length === 0" class="col-span-full text-center text-gray-500 py-8">
                No hay atributos configurados para esta tienda.
              </div>
            </div>

            <div class="flex justify-between items-center">
              <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" formControlName="activo" class="w-5 h-5 text-indigo-600">
                <span class="font-medium">Variante activa</span>
              </label>
              <button type="button" *ngIf="variantes.length > 1" (click)="eliminarVariante(i)"
                      class="text-red-600 hover:text-red-800 text-sm font-medium">
                Eliminar
              </button>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-4 mt-12">
          <button type="button" (click)="close.emit()" class="btn-cancel">Cancelar</button>
          <button type="submit" [disabled]="saving() || form.invalid" class="btn-save">
            <span *ngIf="!saving()">Guardar Producto</span>
            <span *ngIf="saving()">Guardando...</span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
