<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="text-2xl font-bold text-gray-800">
        {{ isEdit() ? 'Editar Producto' : 'Nuevo Producto' }}
      </h2>
      <button class="close-btn" (click)="close.emit()">×</button>
    </div>

    <div class="modal-body">
      <!-- Loading -->
      <div *ngIf="loading()" class="text-center py-16">
        <div class="spinner-modern inline-block"></div>
        <p class="mt-4 text-gray-600">Cargando producto...</p>
      </div>

      <!-- Formulario -->
      <div *ngIf="!loading()">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre del producto *</label>
            <input type="text" [(ngModel)]="nombre" (blur)="generateSlug()"
                   class="input-modern" placeholder="Camiseta Oversize Cotton">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Slug (URL)</label>
            <input type="text" [(ngModel)]="slug"
                   class="input-modern" placeholder="Se genera automáticamente">
          </div>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Categoría *</label>
          <select [(ngModel)]="categoriaId" class="input-modern">
            <option [ngValue]="null">Seleccionar categoría</option>
            <option *ngFor="let cat of categorias()" [ngValue]="cat.id">
              {{ cat.nombre }}
            </option>
          </select>
        </div>

        <hr class="my-10 border-gray-200">

        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-gray-800">Variantes</h3>
          <button type="button" (click)="agregarVariante()" class="btn-secondary">
            + Agregar variante
          </button>
        </div>

        <div *ngFor="let variante of variantes(); let i = index" class="variante-card mb-8">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <input type="text" [(ngModel)]="variante.sku" placeholder="SKU * (ej: CAM-001)"
                   class="input-modern">
            <input type="number" [(ngModel)]="variante.precio" placeholder="Precio *"
                   class="input-modern">
            <input type="number" [(ngModel)]="variante.stock" placeholder="Stock"
                   class="input-modern">
            <input type="url" [(ngModel)]="variante.imagenUrl" placeholder="URL Imagen (opcional)"
                   class="input-modern">
          </div>

          <!-- Atributos dinámicos -->
          <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">
            <div *ngFor="let attr of atributos()">
              <label class="block text-sm font-medium text-gray-700 mb-1">{{ attr.nombre }}</label>
              <select [(ngModel)]="variante.atributosSeleccionados[attr.nombre]" class="input-modern text-sm">
                <option [ngValue]="''">— Sin {{ attr.nombre.toLowerCase() }} —</option>
                <option *ngFor="let val of getValoresAtributo(attr.nombre)" [value]="val.valor">
                  {{ val.valor }}
                </option>
              </select>
            </div>
          </div>

          <div class="flex justify-between items-center">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" [(ngModel)]="variante.activo" class="w-5 h-5">
              <span class="text-sm font-medium">Variante activa</span>
            </label>
            <button *ngIf="variantes().length > 1" type="button" (click)="eliminarVariante(i)"
                    class="text-red-600 hover:text-red-800 text-sm font-medium">
              Eliminar variante
            </button>
          </div>
        </div>

        <div class="flex justify-end gap-4 mt-10">
          <button type="button" (click)="close.emit()" class="btn-cancel">
            Cancelar
          </button>
          <button (click)="guardar()" [disabled]="saving()" class="btn-primary">
            <span *ngIf="!saving()">Guardar Producto</span>
            <span *ngIf="saving()">Guardando...</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
